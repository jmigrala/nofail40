<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get NOFAIL40 on Your Phone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0c0e;
      color: #f5f3f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: #1a1a1e;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 24px;
    }
    .logo sup {
      color: #e8872e;
      font-weight: 500;
      font-size: 0.55em;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: #a0a0a0;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #e8872e;
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 16px;
      width: 100%;
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent;
      border: 1px solid #333;
      color: #f5f3f0;
    }
    .note {
      color: #666;
      font-size: 13px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">NOFAIL<sup>40</sup></div>
    <h1>Lock down your phone too.</h1>
    <p>You've blocked distractions on your computer. Now close the last loophole — your phone.</p>

    <div id="ios-section">
      <a href="#" class="btn" id="testflight-btn">Join the iOS Beta (TestFlight)</a>
      <p class="note">The iOS app uses Apple's Screen Time API for system-level blocking. Coming soon to TestFlight.</p>
    </div>

    <a href="https://nofail40.com" class="btn btn-secondary">Back to NOFAIL<sup>40</sup></a>
  </div>

  <script>
    // When TestFlight is ready, update this URL
    const testflightUrl = null; // e.g., 'https://testflight.apple.com/join/XXXXX'
    const btn = document.getElementById('testflight-btn');
    if (testflightUrl) {
      btn.href = testflightUrl;
    } else {
      btn.style.opacity = '0.5';
      btn.style.pointerEvents = 'none';
      btn.textContent = 'iOS App Coming Soon';
    }
  </script>
</body>
</html>
